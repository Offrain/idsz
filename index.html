<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Secure System</title>
</head>
<body>

<div id="auth">
  <h2>Auth</h2>

  <input id="email" placeholder="email"><br><br>
  <input id="pass" type="password" placeholder="password"><br><br>

  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>

  <p id="msg"></p>
</div>

<div id="app" style="display:none;">
  <h1>Dashboard</h1>

  <button onclick="doAction()">Save action</button>
  <button onclick="logout()">Logout</button>

  <p id="info"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  updateDoc,
  collection,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 CONFIG (ВСТАВЬ СВОЙ) */
const firebaseConfig = {
  apiKey: "AIzaSyCAL20P_NiAsJ54BHTW81FZba0FYNOc6SU",
  authDomain: "prst-99760.firebaseapp.com",
  projectId: "prst-99760",
  storageBucket: "prst-99760.firebasestorage.app",
  messagingSenderId: "72274793382",
  appId: "1:72274793382:web:8f0e20d0290e497985f567",
  measurementId: "G-WPPYRDL3ZE"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* 🧠 DEVICE ID */
function getDeviceId() {
  let id = localStorage.getItem("deviceId");
  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem("deviceId", id);
  }
  return id;
}

/* 🔐 REGISTER */
window.register = async function () {
  const email = emailEl().value;
  const pass = passEl().value;

  try {
    await createUserWithEmailAndPassword(auth, email, pass);

    await setDoc(doc(db, "users", email), {
      email,
      deviceId: getDeviceId(),
      switchCount: 0,
      blocked: false
    });

    setMsg("Registered");
  } catch (e) {
    setMsg(e.message);
  }
};

/* 🔑 LOGIN */
window.login = async function () {
  const email = emailEl().value;
  const pass = passEl().value;

  try {
    await signInWithEmailAndPassword(auth, email, pass);

    const ref = doc(db, "users", email);
    const snap = await getDoc(ref);

    if (!snap.exists()) return;

    let user = snap.data();

    if (user.blocked) {
      await signOut(auth);
      return setMsg("BLOCKED USER");
    }

    const deviceId = getDeviceId();

    // 🔁 смена устройства
    if (user.deviceId && user.deviceId !== deviceId) {
      user.switchCount++;

      if (user.switchCount >= 3) {
        await updateDoc(ref, { blocked: true });
        await signOut(auth);
        return setMsg("Blocked (device limit)");
      }

      await updateDoc(ref, {
        switchCount: user.switchCount
      });
    }

    await updateDoc(ref, {
      deviceId
    });

    setMsg("OK");
  } catch (e) {
    setMsg(e.message);
  }
};

/* 📜 ACTION + HISTORY */
window.doAction = async function () {
  const user = auth.currentUser;
  if (!user) return;

  await addDoc(collection(db, "logs"), {
    email: user.email,
    action: "clicked button",
    time: serverTimestamp()
  });

  document.getElementById("info").innerText = "Saved log";
};

/* 🚪 LOGOUT */
window.logout = async function () {
  await signOut(auth);
};

/* 🔒 AUTH STATE (ЗАЩИТА СТРАНИЦЫ) */
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    document.getElementById("auth").style.display = "block";
    document.getElementById("app").style.display = "none";
    return;
  }

  // проверка блокировки
  const ref = doc(db, "users", user.email);
  const snap = await getDoc(ref);

  if (snap.exists() && snap.data().blocked) {
    await signOut(auth);
    setMsg("BLOCKED");
    return;
  }

  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";
});

/* UI helpers */
function emailEl() {
  return document.getElementById("email");
}
function passEl() {
  return document.getElementById("pass");
}
function setMsg(t) {
  document.getElementById("msg").innerText = t;
}

</script>

</body>
</html>
