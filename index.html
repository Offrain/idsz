<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест жүйесі</title>

<style>
body { font-family: Arial, sans-serif; margin: 20px; }

.question {
    margin-bottom: 25px;
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

.variant {
    display: block;
    margin: 5px 0;
    cursor: pointer;
}

.correct { color: green; }
.incorrect { color: red; }

.pagination { margin-top: 20px; }

.pagination button {
    margin: 5px;
    padding: 5px 10px;
    cursor: pointer;
}

.active {
    background: blue;
    color: white;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="auth">
  <h2>Кіру</h2>

  <input id="email" placeholder="email"><br><br>
  <input id="pass" type="password" placeholder="password"><br><br>

  <button onclick="login()">Кіру</button>
  <button onclick="register()">Тіркелу</button>

  <p id="msg"></p>
</div>

<!-- 🔥 APP (ТВОЙ ТЕСТ) -->
<div id="app" style="display:none;">

<h1>Тест</h1>

<button onclick="shuffleQuestions()">Барлық сұрақтарды араластыру</button>
<button onclick="shuffleCurrentPage()">Осы беттегі сұрақтарды араластыру</button>
<button onclick="resetAll()">Қайта бастау</button>
<button onclick="showAllAnswers()">Жауап көрсету</button>

<div id="quiz"></div>
<div id="pagination"></div>

</div>

<script type="module">

/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  updateDoc,
  collection,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCAL20P_NiAsJ54BHTW81FZba0FYNOc6SU",
  authDomain: "prst-99760.firebaseapp.com",
  projectId: "prst-99760",
  storageBucket: "prst-99760.firebasestorage.app",
  messagingSenderId: "72274793382",
  appId: "1:72274793382:web:8f0e20d0290e497985f567",
  measurementId: "G-WPPYRDL3ZE"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= DEVICE ID ================= */
function getDeviceId() {
  let id = localStorage.getItem("deviceId");
  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem("deviceId", id);
  }
  return id;
}

/* ================= AUTH ================= */

window.register = async function () {
  const email = emailEl().value;
  const pass = passEl().value;

  try {
    await createUserWithEmailAndPassword(auth, email, pass);

    await setDoc(doc(db, "users", email), {
      email,
      deviceId: getDeviceId(),
      switchCount: 0,
      blocked: false
    });

    setMsg("OK тіркелді");
  } catch (e) {
    setMsg(e.message);
  }
};

window.login = async function () {
  const email = emailEl().value;
  const pass = passEl().value;

  try {
    await signInWithEmailAndPassword(auth, email, pass);

    const ref = doc(db, "users", email);
    const snap = await getDoc(ref);

    const deviceId = getDeviceId();

    // 👤 если пользователя нет в базе — создаём и привязываем устройство
    if (!snap.exists()) {
      await setDoc(ref, {
        email,
        deviceId,
        blocked: false
      });

      setMsg("Первый вход OK");
      return;
    }

    const data = snap.data();

    // 🚫 ЕСЛИ УЖЕ ЕСТЬ ДРУГОЕ УСТРОЙСТВО → ЗАПРЕТ
    if (data.deviceId && data.deviceId !== deviceId) {
      await signOut(auth);
      setMsg("❌ Вход запрещён: аккаунт привязан к другому устройству");
      return;
    }

    // ✅ нормальный вход
    await updateDoc(ref, {
      deviceId,
      blocked: false
    });

    setMsg("OK кірді");

  } catch (e) {
    setMsg(e.message);
  }
};

/* ================= SESSION CHECK ================= */
onAuthStateChanged(auth, async (user) => {
  if (!user) return hideApp();

  const ref = doc(db, "users", user.email);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    await signOut(auth);
    return;
  }

  const data = snap.data();
  const deviceId = getDeviceId();

  // 🚫 если устройство не совпадает → выкинуть
  if (data.deviceId !== deviceId) {
    await signOut(auth);
    alert("Этот аккаунт уже используется на другом устройстве");
    return;
  }

  showApp();
});

/* ================= HELPERS ================= */
function emailEl() {
  return document.getElementById("email");
}
function passEl() {
  return document.getElementById("pass");
}
function setMsg(t) {
  document.getElementById("msg").innerText = t;
}

/* ================= YOUR TEST CODE ================= */

let currentPage = 1;
const questionsPerPage = 50;
let allQuestions = [];

async function loadTest() {
    try {
        const response = await fetch('test.txt');
        const text = await response.text();

        allQuestions = text
            .split('\n')
            .reduce((acc, line) => {
                line = line.trim();
                if (!line) return acc;

                if (line.startsWith('~~')) acc.push(line);
                else if (acc.length > 0) acc[acc.length - 1] += '\n' + line;

                return acc;
            }, [])
            .filter(Boolean);

        renderPage(currentPage);

    } catch (error) {
        document.getElementById('quiz').innerHTML =
            '<p style="color:red;">test.txt жүктелмеді</p>';
    }
}

function showApp() {
  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";
}

function hideApp() {
  document.getElementById("auth").style.display = "block";
  document.getElementById("app").style.display = "none";
}
    
function renderPage(page) {
    const start = (page - 1) * questionsPerPage;
    const end = start + questionsPerPage;
    renderCustomQuestions(allQuestions.slice(start, end), start);
}

function renderCustomQuestions(arr, offset) {
    const quiz = document.getElementById('quiz');
    quiz.innerHTML = '';

    arr.forEach((block, i) => {
        const lines = block.split('\n');

        let q = '';
        let variants = [];

        lines.forEach(l => {
            if (l.startsWith('~~')) q = l.replace('~~','');
            if (l.startsWith('@@')) variants.push(l.replace('@@',''));
        });

        const correct = variants[0];
        const shuffled = [...variants].sort(() => Math.random() - 0.5);

        const div = document.createElement('div');
        div.className = 'question';

        const p = document.createElement('p');
        p.textContent = (offset + i + 1) + '. ' + q;
        div.appendChild(p);

        shuffled.forEach(v => {
            const label = document.createElement('label');
            label.className = 'variant';

            const input = document.createElement('input');
            input.type = 'radio';
            input.name = 'q' + (offset + i);
            input.value = v;

            input.onchange = () => {
                const res = document.getElementById('result' + (offset + i));
                res.textContent = v === correct ? "Дұрыс ✅" : "Қате ❌";
                res.className = v === correct ? "correct" : "incorrect";
            };

            label.appendChild(input);
            label.appendChild(document.createTextNode(v));
            div.appendChild(label);
        });

        const res = document.createElement('div');
        res.id = 'result' + (offset + i);
        div.appendChild(res);

        quiz.appendChild(div);
    });
}

</script>
